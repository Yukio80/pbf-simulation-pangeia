version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pangeia-db
    environment:
      POSTGRES_DB: pangeia
      POSTGRES_USER: pangeia
      POSTGRES_PASSWORD: pangeia
    ports:
      - "5432:5432"
    volumes:
      - pangeia_pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pangeia"]
      interval: 10s
      timeout: 5s
      retries: 5

  pangeia:
    build: .
    container_name: pangeia
    ports:
      - "8000:8000"
    environment:
      - PANGEIA_POPULATION=500
      - PANGEIA_SEED=42
      - PANGEIA_TICK_INTERVAL=0.1
      - PANGEIA_PERSISTENCE=postgres
      - PANGEIA_DATABASE_URL=postgresql://pangeia:pangeia@postgres:5432/pangeia
    volumes:
      - pangeia_data:/app/data
    command: python main.py --port 8000
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  pangeia-cli:
    build: .
    container_name: pangeia-cli
    profiles:
      - cli
    environment:
      - PANGEIA_PERSISTENCE=postgres
      - PANGEIA_DATABASE_URL=postgresql://pangeia:pangeia@postgres:5432/pangeia
    command: python main.py --cli --ticks 1000 --population 500
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pangeia_data:
  pangeia_pgdata:
